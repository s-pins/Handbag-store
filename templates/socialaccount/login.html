{% extends 'base.html' %}
{% load i18n %}
{% load socialaccount %}

{% block content %}
<div class="container mt-5 pt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-4">
            <div class="card shadow-sm border-0">
                <div class="card-body p-4 text-center">
                    <h3 class="card-title text-center mb-2" style="font-family: 'Playfair Display', serif;">Sign In</h3>
                    <p class="text-muted small mb-4">
                        You are being signed in with <strong>{{ account.get_provider.name }}</strong>.
                    </p>

                    <form method="post" action="{% url 'socialaccount_login' provider_id=account.get_provider.id %}">
                        {% csrf_token %}
                        {{ redirect_field }}
                        <button type="submit" class="btn btn-gold w-100 py-2 rounded-0 d-flex align-items-center justify-content-center gap-2">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 48 48">
                                <path fill="#EA4335" d="M24 9.5c3.1 0 5.9 1.1 8.1 2.9l6-6C34.5 3.1 29.5 1 24 1 14.8 1 7 6.7 3.7 14.6l7 5.4C12.4 13.6 17.7 9.5 24 9.5z"/>
                                <path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.6 3-2.3 5.5-4.8 7.2l7.4 5.7c4.3-4 6.8-9.9 6.8-16.9z"/>
                                <path fill="#FBBC05" d="M10.7 28.4c-.5-1.5-.8-3-.8-4.4s.3-2.9.8-4.4l-7-5.4C2.2 17.1 1 20.4 1 24s1.2 6.9 3.2 9.8l7.5-5.4z"/>
                                <path fill="#34A853" d="M24 47c5.4 0 9.9-1.8 13.2-4.8l-7.4-5.7c-1.8 1.2-4.1 1.9-5.8 1.9-6.3 0-11.6-4.1-13.3-9.8l-7.5 5.4C7 41.3 14.8 47 24 47z"/>
                            </svg>
                            Continue with Google
                        </button>
                    </form>

                    <p class="text-center mt-4 mb-0">
                        <a href="{% url 'account_login' %}" class="text-dark small">← Back to Login</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
