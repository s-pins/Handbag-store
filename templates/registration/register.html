{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block content %}
<div class="container mt-5 pt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-4">
            <div class="card shadow-sm border-0">
                <div class="card-body p-4">
                    <h3 class="card-title text-center mb-4" style="font-family: 'Playfair Display', serif;">Create Account</h3>
                    <form method="post">
                        {% csrf_token %}
                        {{ form|crispy }}
                        <button type="submit" class="btn btn-gold w-100 mt-3 py-2 rounded-0">REGISTER</button>
                    </form>
                    <p class="text-center mt-3 mb-0">
                        Already have an account? <a href="{% url 'login' %}" class="text-dark fw-bold">Login here</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
